name: Docker

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: broker
            dockerfile: deployments/broker.Dockerfile
          - name: api
            dockerfile: deployments/api.Dockerfile
          - name: dashboard
            dockerfile: deployments/dashboard.Dockerfile
          - name: sim
            dockerfile: deployments/sim.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          tags: crabmq/${{ matrix.name }}:ci
